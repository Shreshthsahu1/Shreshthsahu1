  <circle cx="128" cy="110" r="3" fill="#00f5ff" opacity="0.7"/>
  <circle cx="116" cy="130" r="2.5" fill="#00f5ff" opacity="0.45"/>
  <circle cx="108" cy="150" r="2" fill="#00f5ff" opacity="0.25"/>
  <circle cx="128" cy="200" r="3" fill="#bf5af2" opacity="0.7"/>
  <circle cx="116" cy="220" r="2.5" fill="#bf5af2" opacity="0.45"/>
  <circle cx="108" cy="240" r="2" fill="#bf5af2" opacity="0.25"/>

  <!-- Name -->
  <text x="250" y="335" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="url(#nameFill)" text-anchor="middle" letter-spacing="5">SHRESHTH</text>

  <rect x="80" y="346" width="340" height="1.5" rx="0.75" fill="url(#cyanH)" opacity="0.5"/>

  <text x="250" y="376" font-family="Arial, sans-serif" font-size="19" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="10" opacity="0.9">SAHU</text>

