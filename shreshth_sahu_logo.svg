  <g stroke="#00f5ff" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="14,24 14,14 24,14"/>
    <polyline points="476,14 486,14 486,24"/>
    <polyline points="14,476 14,486 24,486"/>
    <polyline points="476,486 486,486 486,476"/>
