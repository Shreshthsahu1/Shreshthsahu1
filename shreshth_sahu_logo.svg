  <circle cx="170" cy="92" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="298" cy="92" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="298" cy="138" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="170" cy="179" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="308" cy="179" r="5.5" fill="#050d1a" stroke="#bf5af2" stroke-width="1.5"/>
  <circle cx="172" cy="236" r="5.5" fill="#050d1a" stroke="#bf5af2" stroke-width="1.5"/>
