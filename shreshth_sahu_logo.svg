  <rect x="160" y="396" width="180" height="28" rx="7" fill="#07182e" stroke="#00f5ff" stroke-width="0.75" opacity="0.9"/>
  <text x="250" y="415" font-family="Courier New, monospace" font-size="12" fill="#00f5ff" text-anchor="middle" letter-spacing="1">&lt;cs.student /&gt;</text>

