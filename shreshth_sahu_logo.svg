  <polyline points="308,179 340,179 340,270" fill="none" stroke="#bf5af2" stroke-width="1" stroke-dasharray="4 3" opacity="0.55"/>
  <circle cx="340" cy="270" r="3.5" fill="#bf5af2" opacity="0.7"/>

