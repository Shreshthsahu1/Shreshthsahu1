  <text x="424" y="32" font-family="Courier New, monospace" font-size="10" fill="#00f5ff" text-anchor="middle" opacity="0.75">ID::SS_2025</text>

  <!-- Version -->
  <text x="20" y="482" font-family="Courier New, monospace" font-size="10" fill="#bf5af2" opacity="0.5">v1.0.0</text>
