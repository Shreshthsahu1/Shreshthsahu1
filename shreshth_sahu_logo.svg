  <rect x="168" y="80" width="130" height="24" rx="4" fill="url(#cyan)"/>
  <!-- Top-right vertical -->
  <rect x="276" y="80" width="24" height="58" rx="4" fill="url(#cyan)" opacity="0.75"/>
  <!-- Middle bar -->
  <rect x="158" y="167" width="150" height="24" rx="4" fill="url(#cyan)"/>
  <!-- Bottom-left vertical -->
  <rect x="148" y="191" width="24" height="55" rx="4" fill="url(#cyan)" opacity="0.75"/>
  <!-- Bottom bar -->
