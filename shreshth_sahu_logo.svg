  <circle cx="370" cy="110" r="3" fill="#00f5ff" opacity="0.7"/>
  <circle cx="382" cy="130" r="2.5" fill="#00f5ff" opacity="0.45"/>
  <circle cx="390" cy="150" r="2" fill="#00f5ff" opacity="0.25"/>
  <circle cx="370" cy="200" r="3" fill="#bf5af2" opacity="0.7"/>
  <circle cx="382" cy="220" r="2.5" fill="#bf5af2" opacity="0.45"/>
  <circle cx="390" cy="240" r="2" fill="#bf5af2" opacity="0.25"/>

