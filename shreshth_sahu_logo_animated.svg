<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf5af2"/>
      <stop offset="100%" stop-color="#6e40c9"/>
    </linearGradient>
    <linearGradient id="nameFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="cyanH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>

    <!-- Shimmer gradient animation -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff">
        <animate attributeName="offset" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ffffff">
        <animate attributeName="offset" values="0.5;1.5;0.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#bf5af2">
        <animate attributeName="offset" values="1;2;1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="500" height="500" rx="24"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect x="0" y="0" width="500" height="500" rx="24" fill="#050d1a"/>

  <!-- Animated border glow -->
  <rect x="1" y="1" width="498" height="498" rx="23" fill="none" stroke="#00f5ff" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Grid lines -->
  <g clip-path="url(#cardClip)" opacity="0.05" stroke="#00f5ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="500" y2="50"/>
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="0" y1="450" x2="500" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
  </g>

  <!-- Floating particles -->
  <circle cx="80" cy="80" r="2" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="cy" values="80;70;80" dur="3s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="420" cy="100" r="1.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="100;90;100" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="60" cy="380" r="2" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cx" values="60;70;60" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="440" cy="350" r="1.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="130" cy="430" r="1.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="370" cy="420" r="2" fill="#bf5af2">
    <animate attributeName="opacity" values="0;0.5;0" dur="3.2s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="250" cy="50" r="1.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="460" cy="240" r="2" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.4;0" dur="4.2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- Circuit S frame -->
  <rect x="148" y="58" width="204" height="214" rx="12" fill="#07182e" stroke="#00f5ff" stroke-width="1" opacity="0.6"/>

  <!-- Scan line -->
  <rect x="148" y="158" width="204" height="2" rx="1" fill="#00f5ff">
    <animate attributeName="y" values="58;272;58" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.25;0.25;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- TOP BAR of S — draw animation -->
  <rect x="168" y="78" width="130" height="24" rx="4" fill="url(#gc)">
    <animate attributeName="width" values="0;130" dur="0.8s" fill="freeze" begin="0.2s"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="1s"/>
  </rect>

  <!-- TOP-RIGHT VERTICAL -->
  <rect x="276" y="78" width="24" height="58" rx="4" fill="url(#gc)" opacity="0.75">
    <animate attributeName="height" values="0;58" dur="0.6s" fill="freeze" begin="0.9s"/>
  </rect>

  <!-- MIDDLE BAR -->
  <rect x="158" y="161" width="150" height="24" rx="4" fill="url(#gc)">
    <animate attributeName="width" values="0;150" dur="0.9s" fill="freeze" begin="1.4s"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite" begin="2s"/>
  </rect>

  <!-- BOTTOM-LEFT VERTICAL -->
  <rect x="148" y="185" width="24" height="55" rx="4" fill="url(#gp)" opacity="0.8">
    <animate attributeName="height" values="0;55" dur="0.6s" fill="freeze" begin="1.8s"/>
  </rect>

  <!-- BOTTOM BAR -->
  <rect x="148" y="218" width="130" height="24" rx="4" fill="url(#gp)">
    <animate attributeName="width" values="0;130" dur="0.8s" fill="freeze" begin="2.2s"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="3s"/>
  </rect>

  <!-- Node dots with pulse -->
  <circle cx="170" cy="90" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="0.3s"/>
    <animate attributeName="r" values="5.5;7;5.5" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="298" cy="90" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.0s"/>
    <animate attributeName="r" values="5.5;7;5.5" dur="2.2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="298" cy="136" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.5s"/>
    <animate attributeName="r" values="5.5;7;5.5" dur="1.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="170" cy="173" r="5.5" fill="#050d1a" stroke="#00f5ff" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.6s"/>
  </circle>
  <circle cx="308" cy="173" r="5.5" fill="#050d1a" stroke="#bf5af2" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.0s"/>
    <animate attributeName="r" values="5.5;7;5.5" dur="2.4s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="170" cy="230" r="5.5" fill="#050d1a" stroke="#bf5af2" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.3s"/>
  </circle>
  <circle cx="278" cy="230" r="5.5" fill="#050d1a" stroke="#bf5af2" stroke-width="1.5">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.5s"/>
    <animate attributeName="r" values="5.5;7;5.5" dur="2s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- External traces with draw animation -->
  <polyline points="298,90 340,90 340,58" fill="none" stroke="#00f5ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.7s" fill="freeze" begin="1.4s"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite" begin="2s"/>
  </polyline>
  <circle cx="340" cy="58" r="3.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" fill="freeze" begin="1.8s"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="1.5s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <polyline points="170,78 148,78 148,58" fill="none" stroke="#00f5ff" stroke-width="1" stroke-dasharray="4 3" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="60;0" dur="0.7s" fill="freeze" begin="1.6s"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite" begin="2.2s"/>
  </polyline>
  <circle cx="148" cy="58" r="3.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" fill="freeze" begin="2.0s"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="1.8s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <polyline points="278,242 278,272 148,272" fill="none" stroke="#bf5af2" stroke-width="1" stroke-dasharray="4 3" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.7s" fill="freeze" begin="2.6s"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite" begin="3s"/>
  </polyline>
  <circle cx="148" cy="272" r="3.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" fill="freeze" begin="3.0s"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="2s" repeatCount="indefinite" begin="3.5s"/>
  </circle>

  <polyline points="308,173 340,173 340,272" fill="none" stroke="#bf5af2" stroke-width="1" stroke-dasharray="4 3" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.7s" fill="freeze" begin="2.8s"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite" begin="3.2s"/>
  </polyline>
  <circle cx="340" cy="272" r="3.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0;0.7" dur="0.3s" fill="freeze" begin="3.2s"/>
    <animate attributeName="r" values="3.5;5;3.5" dur="1.6s" repeatCount="indefinite" begin="3.8s"/>
  </circle>

  <!-- Data stream dots right - pulsing -->
  <circle cx="372" cy="110" r="3" fill="#00f5ff">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="r" values="3;1.5;3" dur="2.4s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="382" cy="130" r="2.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite" begin="2.2s"/>
  </circle>
  <circle cx="388" cy="150" r="2" fill="#00f5ff">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2.4s" repeatCount="indefinite" begin="2.4s"/>
  </circle>
  <circle cx="372" cy="198" r="3" fill="#bf5af2">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite" begin="2.4s"/>
    <animate attributeName="r" values="3;1.5;3" dur="2.8s" repeatCount="indefinite" begin="2.4s"/>
  </circle>
  <circle cx="382" cy="218" r="2.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.8s" repeatCount="indefinite" begin="2.7s"/>
  </circle>
  <circle cx="388" cy="238" r="2" fill="#bf5af2">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2.8s" repeatCount="indefinite" begin="3.0s"/>
  </circle>

  <!-- Data stream dots left -->
  <circle cx="126" cy="110" r="3" fill="#00f5ff">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.4s" repeatCount="indefinite" begin="2.1s"/>
    <animate attributeName="r" values="3;1.5;3" dur="2.4s" repeatCount="indefinite" begin="2.1s"/>
  </circle>
  <circle cx="116" cy="130" r="2.5" fill="#00f5ff">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite" begin="2.3s"/>
  </circle>
  <circle cx="110" cy="150" r="2" fill="#00f5ff">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2.4s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="126" cy="198" r="3" fill="#bf5af2">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="r" values="3;1.5;3" dur="2.8s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="116" cy="218" r="2.5" fill="#bf5af2">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.8s" repeatCount="indefinite" begin="2.8s"/>
  </circle>
  <circle cx="110" cy="238" r="2" fill="#bf5af2">
    <animate attributeName="opacity" values="0.25;0.05;0.25" dur="2.8s" repeatCount="indefinite" begin="3.1s"/>
  </circle>

  <!-- NAME with fade-in -->
  <text x="250" y="335" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900"
        fill="url(#shimmer)" text-anchor="middle" letter-spacing="5">
    SHRESHTH
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze" begin="2.5s"/>
  </text>

  <!-- Divider line animated -->
  <rect x="80" y="346" width="340" height="1.5" rx="0.75" fill="url(#cyanH)">
    <animate attributeName="width" values="0;340" dur="1s" fill="freeze" begin="2.8s"/>
    <animate attributeName="x" values="250;80" dur="1s" fill="freeze" begin="2.8s"/>
  </rect>

  <text x="250" y="376" font-family="Arial, sans-serif" font-size="19" font-weight="300"
        fill="#ffffff" text-anchor="middle" letter-spacing="10" opacity="0.9">
    SAHU
    <animate attributeName="opacity" values="0;0.9" dur="1s" fill="freeze" begin="3s"/>
  </text>

  <!-- Tag box -->
  <rect x="160" y="396" width="180" height="28" rx="7" fill="#07182e" stroke="#00f5ff" stroke-width="0.75">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3.2s"/>
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="3.5s"/>
  </rect>
  <text x="250" y="415" font-family="Courier New, monospace" font-size="12"
        fill="#00f5ff" text-anchor="middle" letter-spacing="1">
    &lt;cs.student /&gt;
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3.3s"/>
  </text>

  <!-- Binary strip flickering -->
  <text x="250" y="450" font-family="Courier New, monospace" font-size="9"
        fill="#0080ff" text-anchor="middle" letter-spacing="2">
    0101 1010 · SS · 0110 1000
    <animate attributeName="opacity" values="0.3;0.9;0.2;0.8;0.3" dur="4s" repeatCount="indefinite" begin="3.5s"/>
  </text>

  <!-- Corner brackets -->
  <g stroke="#00f5ff" stroke-width="1.5" fill="none">
    <polyline points="14,24 14,14 24,14" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="476,14 486,14 486,24" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </polyline>
    <polyline points="14,476 14,486 24,486" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </polyline>
    <polyline points="476,486 486,486 486,476" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </polyline>
  </g>

  <!-- ID badge blinking -->
  <rect x="360" y="16" width="116" height="20" rx="10" fill="#00f5ff" opacity="0.1"/>
  <text x="418" y="30" font-family="Courier New, monospace" font-size="10"
        fill="#00f5ff" text-anchor="middle" letter-spacing="1">
    ID::SS_2025
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Version -->
  <text x="20" y="482" font-family="Courier New, monospace" font-size="10" fill="#bf5af2" opacity="0.5">v1.0.0</text>

</svg>
